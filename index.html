<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>🏮නිග්‍රෝධමික ජාතකය🏮</title>
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #000;
            /* ඔයාගේ GitHub එකේ තියෙන පින්තූරය පසුබිමට දාලා තියෙනවා */
            background-image: url('https://raw.githubusercontent.com/GaMalinda/1-Relay-Control-002/main/download.jfif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white; 
            margin: 0; 
            padding: 10px; 
            overflow-x: hidden; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.6s ease; }
        .login-card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 85%; max-width: 350px; text-align: center; }
        .login-card h2 { color: var(--gold); margin-bottom: 25px; font-size: 22px; }
        .login-card input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; font-size: 18px; text-align: center; box-sizing: border-box; outline: none; }
        .login-card input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        .login-btn { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        
        #main-content { display: none; opacity: 0; transition: opacity 0.8s ease; width: 100%; }

        h2 { color: var(--gold); text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); margin-bottom: 15px; }
        .container { position: relative; width: 100vw; height: 80vh; max-width: 800px; display: flex; align-items: center; justify-content: center; }
        
        /* රිලේ බටන් එකේ පෙනුම */
        .btn { 
            position: absolute; 
            transform: translate(-50%, -50%); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            color: white; 
            user-select: none; 
            touch-action: none; 
            border: 2px solid rgba(255,255,255,0.3); 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border-radius: 50%;
            font-size: 20px;
            /* බටන් එකේ පිහිටීම - Admin Mode එකෙන් වෙනස් කරගන්න පුළුවන් */
            top: 50%; left: 50%; width: 80px; height: 80px;
        }

        .on { background: #2ecc71 !important; box-shadow: 0 0 20px #2ecc71; border-color: #fff !important; transform: translate(-50%, -50%) scale(1.1); } 
        .off { background: rgba(0,0,0,0.7); border-color: rgba(255,255,255,0.4); }

        .selected { border: 3px solid #ffee00 !important; box-shadow: 0 0 25px #ffee00 !important; z-index: 100; }
        #editor-controls { position: fixed; top: 10px; display: none; background: #1a1a1a; padding: 15px; border-radius: 12px; border: 1px solid var(--gold); z-index: 1100; }
        .ctrl-btn { background: var(--gold); color: black; border: none; padding: 10px 15px; margin: 5px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .footer-container { margin-top: 20px; text-align: center; width: 100%; }
        .tsda-text { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>🏮නිග්‍රෝධමික ජාතකය🏮</h2>
            <p style="color: #666; font-size: 14px; margin-bottom: 20px;">පාලක පුවරුවට පිවිසීමට ඔබගේ අංකය ඇතුළත් කරන්න</p>
            <input type="tel" id="phoneInput" placeholder="0XXXXXXXXX" maxlength="10">
            <button class="login-btn" onclick="checkLogin()">LOGIN</button>
            <p id="error-msg" style="color: #ff4757; font-size: 13px; margin-top: 10px; display: none;">අංකය වැරදියි.</p>
        </div>
    </div>

    <div id="main-content">
        <h2>🏮නිග්‍රෝධමික ජාතකය🏮</h2>
        
        <div id='editor-controls'>
            <button class='ctrl-btn' onclick='changeSize(5)'>SIZE +</button>
            <button class='ctrl-btn' onclick='changeSize(-5)'>SIZE -</button>
            <button class='ctrl-btn' onclick='copyNewCode()'>COPY CSS</button>
        </div>

        <div class='container' id='mainContainer'>
            <div class='btn off' data-id='0' id='relayBtn' onclick='handleBtnClick(this)'>1</div>
        </div>

        <div class='footer-container'>
            <p><button onclick='unlockEditor()' id='lockBtn' style='background:transparent; color:#333; border:none; font-size:10px;'>.</button></p>
            <div class='tsda-text'>TSDA ENGINEERING</div>
            <div style="font-size: 14px; color: #666;">071 200 1813</div>
        </div>
    </div>

<script>
    // Firebase විස්තර
    const AUTH_NUMBER = "0712001813";
    const firebaseConfig = { 
        apiKey: "AIzaSyB3-nR-0B7ZFA-CnA8LBAdN8Wn0-xwnSc", 
        databaseURL: "https://relay-control-002-default-rtdb.firebaseio.com" 
    };

    function checkLogin() {
        if(document.getElementById('phoneInput').value === AUTH_NUMBER) {
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                setTimeout(() => document.getElementById('main-content').style.opacity = '1', 50);
                listenToFirebase();
            }, 600);
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    function listenToFirebase() {
        const url = `${firebaseConfig.databaseURL}/relays/r1.json?auth=${firebaseConfig.apiKey}`;
        setInterval(() => {
            fetch(url).then(res => res.json()).then(status => {
                const btn = document.getElementById('relayBtn');
                if(status) { btn.classList.add('on'); btn.classList.remove('off'); }
                else { btn.classList.remove('on'); btn.classList.add('off'); }
            });
        }, 1500);
    }

    function handleBtnClick(el) {
        if(window.editMode) {
            el.classList.add('selected');
            return;
        }
        let newStatus = !el.classList.contains('on');
        fetch(`${firebaseConfig.databaseURL}/relays/r1.json?auth=${firebaseConfig.apiKey}`, {
            method: 'PUT', body: JSON.stringify(newStatus)
        });
    }

    // Admin Mode (Password: 4321)
    function unlockEditor() {
        if(prompt('Admin Key:') == '4321') {
            window.editMode = true;
            document.getElementById('editor-controls').style.display = 'block';
            makeDraggable(document.getElementById('relayBtn'));
        }
    }

    function makeDraggable(el) {
        el.onpointerdown = e => { window.activeEl = el; el.setPointerCapture(e.pointerId); };
        el.onpointermove = e => {
            if(window.activeEl) {
                el.style.left = (e.clientX / window.innerWidth * 100).toFixed(1) + '%';
                el.style.top = (e.clientY / window.innerHeight * 100).toFixed(1) + '%';
            }
        };
        el.onpointerup = () => window.activeEl = null;
    }

    function changeSize(d) {
        const el = document.getElementById('relayBtn');
        let s = el.offsetWidth;
        el.style.width = (s + d) + 'px'; el.style.height = (s + d) + 'px';
    }

    function copyNewCode() {
        const el = document.getElementById('relayBtn');
        alert(`CSS: top: ${el.style.top}; left: ${el.style.left}; width: ${el.style.width};`);
    }
</script>
</body>
</html>
